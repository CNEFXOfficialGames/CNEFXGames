<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CNEFX' Game Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    /* 🏠 HOME BUTTON */
    .home-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #1c1c1c;
      padding: 10px 14px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border: 1px solid #333;
      transition: 0.2s;
      z-index: 999;
    }

    .home-btn:hover {
      background: #2a2a2a;
      transform: scale(1.05);
    }

    header {
      padding: 50px 20px 20px;
    }

    .status {
      font-size: 14px;
      opacity: 0.8;
    }

    .online {
      color: #00ff88;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 850px;
      margin: auto;
    }

    /* 🎮 GAME CARDS */
    .card {
      background: linear-gradient(145deg, #1c1c1c, #151515);
      padding: 20px;
      border-radius: 14px;
      transition: 0.2s;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    .card:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 25px rgba(0, 255, 136, 0.15);
    }

    a {
      color: white;
      text-decoration: none;
    }

    .game-pfp {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid #333;
      margin-bottom: 10px;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #00ff88;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00cc6a;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.5;
      padding-bottom: 20px;
    }
  </style>
</head>

<body>

  <!-- 🏠 HOME -->
  <a href="index.html" class="home-btn">CNEFX</a>

  <header>
    <h1>CNEFX Game Hub</h1>
    <p class="status">Status: <span class="online">Online</span></p>
    <a href="status.html">Check server status</a>
  </header>

  <div class="grid">

    <!-- 🎮 TETRIS -->
    <a href="tetris.html">
      <div class="card">
        <img class="game-pfp"
          src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Tetrominoes_IJLSZ.png"
          alt="Tetris">

        <h3>TETRIS</h3>
        <p>Stack blocks. Clear lines. Survive.</p>

        <button>Play</button>
      </div>
    </a>

    <!-- GAME 2 -->
    <div class="card">
      <h3>Game 2</h3>
      <p>Coming soon</p>
    </div>

    <!-- STATUS -->
    <div class="card">
      <h3>Server Status</h3>
      <p>Uptime page</p>

      <a href="https://stats.uptimerobot.com/Yvcw7PIGbv" target="_blank">
        <button>Check status</button>
      </a>
    </div>

  </div>

  <footer>
    built by CNEFX 🚀
  </footer>

</body>
</html>
