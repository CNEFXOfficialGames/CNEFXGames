<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CNEFX Game Hub</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: radial-gradient(circle at top, #1b1f3a, #0a0a0f 60%);
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.3;
    pointer-events: none;
  }

  /* 🏠 HOME BUTTON */
  .home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 14px;
    background: rgba(30,30,30,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    z-index: 9999;
    transition: 0.2s;
  }

  .home-btn:hover {
    transform: scale(1.05);
    background: rgba(50,50,50,0.9);
  }

  /* 💬 DISCORD BUTTON */
  .discord-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 10px 14px;
    background: #5865F2;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    z-index: 9999;
    transition: 0.2s;
  }

  .discord-btn:hover {
    transform: scale(1.05);
    background: #4752c4;
  }

  header {
    text-align: center;
    padding: 80px 20px 10px;
  }

  header h1 {
    margin: 0;
    font-size: 44px;
    letter-spacing: 2px;
  }

  .status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.75;
  }

  .online {
    color: #00ff88;
    font-weight: bold;
  }

  .status-btn {
    margin-top: 12px;
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  .status-btn:hover {
    background: #00cc6a;
  }

  /* 🔥 FEATURED GAME */
  .featured {
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
    background: rgba(25,25,25,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(8px);
  }

  .featured h2 {
    margin: 0;
    font-size: 20px;
  }

  .featured p {
    margin: 5px 0 0;
    opacity: 0.7;
    font-size: 13px;
  }

  .featured button {
    padding: 10px 16px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }

  .featured button:hover {
    background: #00cc6a;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    padding: 25px;
    max-width: 1000px;
    margin: auto;
  }

  /* CARD */
  .card {
    background: rgba(25,25,25,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px;
    text-align: center;
    transition: 0.25s;
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: rgba(0,255,136,0.3);
  }

  .card:active {
    transform: scale(0.97);
  }

  h3 {
    margin: 10px 0 5px;
  }

  p {
    font-size: 13px;
    opacity: 0.7;
  }

  button {
    margin-top: 10px;
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #00cc6a;
  }

  a {
    text-decoration: none;
    color: inherit;
  }

  footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    opacity: 0.4;
  }
</style>
</head>

<body>

<!-- 🏠 HOME BUTTON -->
<a href="index.html" class="home-btn">CNEFX</a>

<!-- 💬 DISCORD BUTTON -->
<a href="https://discord.gg/fQTDBBckPW" target="_blank" class="discord-btn">
  Discord
</a>

<!-- HEADER -->
<header>
  <h1>CNEFX Game Hub</h1>

  <div class="status">
    Status: <span class="online">Online</span>
  </div>

  <a href="https://stats.uptimerobot.com/Yvcw7PIGbv">
    <button class="status-btn">Check server status</button>
  </a>
</header>

<!-- 🔥 FEATURED GAME -->
<div class="featured">
  <div>
    <h2>🔥 Featured Game: Moto X3M</h2>
    <p>Stunt racing madness — play instantly</p>
  </div>

  <button onclick="window.location.href='moto-x3m.html'">
    Play Now
  </button>
</div>

<!-- GAME GRID -->
<div class="grid" id="gameGrid"></div>

<footer>
  built by CNEFX 🚀
</footer>

<!-- LOAD GAME DATA -->
<script src="games.js"></script>

<script>
const grid = document.getElementById("gameGrid");

games.forEach(game => {
  grid.innerHTML += `
    <a href="${game.file}">
      <div class="card">
        <h3>${game.name}</h3>
        <p>${game.desc}</p>
        <button>Play</button>
      </div>
    </a>
  `;
});
</script>

</body>
</html>
